name: Velog Upload

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Upload to Velog
        env:
          VELOG_TOKEN: ${{ secrets.VELOG_TOKEN }}
        run: python upload.py
